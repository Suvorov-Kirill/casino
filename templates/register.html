{{define "content"}}

    <div class="panel-wrapper">

        <div class="system-panel">

            <div class="scanline"></div>

            <div class="panel-title">
                CREATE ACCOUNT
            </div>

            <form method="POST" class="system-form" autocomplete="off">

                <input
                        type="text"
                        name="username"
                        placeholder="USERNAME"
                        class="system-input"
                    value="{{.Username}}"
                        required
                >

                <input
                        type="password"
                        name="password"
                        placeholder="PASSWORD"
                        class="system-input"
                        required
                >

                <button type="submit" class="system-button">
                    REGISTER
                </button>

            </form>

            {{if .Message}}
                <div class="status-text {{if .IsSuccess}}status-win{{else}}status-error{{end}}">
                    {{.Message}}
                </div>
            {{end}}

            <a href="/" class="btn-embedded back-link">НАЗАД</a>

        </div>

    </div>

{{end}}
