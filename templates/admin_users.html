{{define "content"}}

    <div class="panel-wrapper">

        <div class="system-panel" style="width: 900px;">

            <div class="scanline"></div>

            <div class="panel-title">
                USER DATABASE
            </div>

            <table class="users-table">

                <tr>
                    <th>ID</th>
                    <th>EMAIL</th>
                    <th>BALANCE</th>
                    <th>ROLE</th>
                    <th>ACTIONS</th>
                </tr>

                {{range .}}

                    <tr>
                        <td>{{.ID}}</td>
                        <td>{{.Email}}</td>
                        <td>{{.Balance}}</td>
                        <td>{{.Role}}</td>
                        <td>
                            <a href="/admin/users/edit?id={{.ID}}" class="action-btn edit-btn">EDIT</a>
                            <a href="/admin/users/delete?id={{.ID}}" class="action-btn delete-btn" onclick="return confirm('Delete user?')">DELETE</a>
                        </td>
                    </tr>

                {{end}}

            </table>

            <div style="margin-top:12px; display:flex; gap:8px; align-items:center;">
            <a href="/" class="btn-embedded"
                style="display:flex; align-items:center; justify-content:center;">
                НАЗАД
            </a>

            <a href="/admin/bets" class="btn-embedded"
                style="display:flex; align-items:center; justify-content:center;">
                СТАВКИ
            </a>
        </div>

        </div>

    </div>

{{end}}
