<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Craps 🎲</h1>

{{if .InProgress}}
<p>Игра в процессе. Point: {{.Point}}</p>
<form method="POST">
    <button type="submit">Бросить кости</button>
</form>
{{else}}
<form method="POST">
    <label>Ставка:</label>
    <input type="number" name="bet" min="10">
    <button type="submit">Начать игру</button>
</form>
{{end}}
</body>
</html>
